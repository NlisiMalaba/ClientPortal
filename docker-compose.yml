services:
  postgres:
    image: postgres:16-alpine
    container_name: clientportal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - clientportal-network

  redis:
    image: redis:7-alpine
    container_name: clientportal-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - clientportal-network

  seq:
    image: datalust/seq:latest
    container_name: clientportal-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA}
      SEQ_FIRSTRUN_NOAUTHENTICATION: ${SEQ_FIRSTRUN_NOAUTHENTICATION}
    ports:
      - "${SEQ_INGEST_PORT}:5341"
      - "${SEQ_UI_PORT}:80"
    volumes:
      - seq_data:/data
    networks:
      - clientportal-network

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    container_name: clientportal-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      ConnectionStrings__Postgres: ${ConnectionStrings__Postgres}
      ConnectionStrings__Redis: ${ConnectionStrings__Redis}
      Serilog__WriteTo__1__Args__serverUrl: ${Serilog__WriteTo__1__Args__serverUrl}
    ports:
      - "${API_PORT}:5000"
    networks:
      - clientportal-network

  client-app:
    build:
      context: ./frontend
      dockerfile: client-portal/Dockerfile
    container_name: clientportal-client-app
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: ${NODE_ENV_PRODUCTION}
    ports:
      - "${CLIENT_APP_PORT}:4200"
    networks:
      - clientportal-network

  business-app:
    build:
      context: ./frontend
      dockerfile: business-portal/Dockerfile
    container_name: clientportal-business-app
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: ${NODE_ENV_PRODUCTION}
    ports:
      - "${BUSINESS_APP_PORT}:4200"
    networks:
      - clientportal-network

  nginx:
    image: nginx:1.27-alpine
    container_name: clientportal-nginx
    restart: unless-stopped
    depends_on:
      - api
      - client-app
      - business-app
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    networks:
      - clientportal-network

volumes:
  postgres_data:
  redis_data:
  seq_data:

networks:
  clientportal-network:
    driver: bridge
